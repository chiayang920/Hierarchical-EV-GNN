<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV-GNN Architecture Map Stage 4</title>
<style>
/* ==== STYLES ==== */
:root {
  --bg-page:#0A0A0A; --bg-panel:#111; --bg-panel-alt:#161616;
  --border:#1F1F1F; --border-strong:#2A2A2A;
  --text-primary:#E5E5E5; --text-secondary:#8A8A8A; --text-muted:#5A5A5A;
  --accent:#CC785C; --accent-soft:#6B8E7F; --accent-warn:#D4A75A;
  --accent-manual:#B57EDC;
  --edge-import:#3A3A3A;
  --zoom:1;
  --map-canvas-width:1800px;
  --side-lane-gap:190px;
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body {
  height:100%; background:var(--bg-page); color:var(--text-primary);
  font-family:"JetBrains Mono","IBM Plex Mono","SF Mono",Menlo,Consolas,monospace;
  font-size:13px; line-height:1.6; overflow:hidden;
}
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#2A2A2A; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#3A3A3A; }

.app { height:100vh; display:flex; flex-direction:column; }

.header {
  height:40px; flex-shrink:0; display:flex; align-items:center;
  padding:0 16px; background:var(--bg-panel); border-bottom:1px solid var(--border);
  color:var(--text-secondary); font-size:13px; gap:2px;
}
.header .caret {
  color:var(--accent); animation:blink 1s steps(1) infinite; margin-left:2px;
}
@keyframes blink { 50% { opacity:0; } }

.tab-bar {
  height:36px; flex-shrink:0; display:flex; background:var(--bg-panel);
  border-bottom:1px solid var(--border); padding-left:12px;
}
.tab {
  height:100%; padding:0 18px; display:flex; align-items:center; cursor:pointer;
  color:var(--text-secondary); font-size:12px; background:transparent;
  border:none; border-bottom:2px solid transparent;
  font-family:inherit; letter-spacing:0.02em; transition:color .12s ease;
}
.tab:hover { color:var(--text-primary); }
.tab.active {
  color:var(--accent); background:var(--bg-panel-alt);
  border-bottom:2px solid var(--accent);
}
.tab.active[data-tab="results"] { color:var(--accent-warn); border-bottom-color:var(--accent-warn); }
.tab.active[data-tab="paper"] { color:var(--accent-soft); border-bottom-color:var(--accent-soft); }
.tab.active[data-tab="manual"]  { color:var(--accent-manual); border-bottom-color:var(--accent-manual); }

.main {
  flex:1; display:grid; grid-template-columns:22% 48% 30%;
  overflow:hidden; min-height:0;
}
.main[data-active-tab="manual"] { display:block; overflow:hidden; }
.main[data-active-tab="manual"] .column { display:none !important; }
.main[data-active-tab="manual"] .manual-page { display:flex !important; height:100%; }
.main:not([data-active-tab="manual"]) .manual-page { display:none !important; }

/* v5 legend scope fix:
   The import/class-inheritance legend is only useful in Training Path because
   side-cards and dependency edges are rendered only there. Evaluation and
   Results are sequential/post-hoc flows, so the legend is intentionally hidden. */
.main[data-active-tab="evaluation"] .legend,
.main[data-active-tab="results"] .legend,
.main[data-active-tab="paper"] .legend,
.main[data-active-tab="manual"] .legend { display:none !important; }
.main[data-active-tab="paper"] #map-controls { display:none !important; }
.main[data-active-tab="paper"] .map-scroll { overflow-x:hidden; }
.main[data-active-tab="paper"] .map-content { min-width:100%; width:100%; padding-right:0; }

.column {
  overflow-y:auto; padding:16px; position:relative; min-height:0;
}
.column + .column { border-left:1px solid var(--border); }

.column-header {
  font-size:10px; color:var(--text-muted); text-transform:uppercase;
  letter-spacing:0.08em; margin-bottom:14px; flex-shrink:0;
}

/* tree */
.tree-item {
  white-space:pre; cursor:pointer; padding:1px 4px 1px 18px; margin:0;
  color:var(--text-primary); font-size:12px; border-radius:2px;
  line-height:1.7; position:relative;
}
.tree-item:hover { background:var(--bg-panel-alt); }
.tree-item.is-folder { color:var(--text-secondary); }
.tree-item.is-root { color:var(--text-muted); font-size:11px; padding-left:4px; }
.tree-item.selected { color:var(--accent); }
.tree-item.selected::before {
  content:"›"; position:absolute; left:6px; top:1px; color:var(--accent);
}

/* map column */
#map-col { display:flex; flex-direction:column; overflow:hidden; padding:16px; }
.map-header-row {
  display:flex; justify-content:space-between; align-items:center;
  gap:12px; flex-wrap:wrap; margin-bottom:14px;
}
.map-header-left {
  display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; flex:1; min-width:0;
}
.map-controls { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.ctrl-btn {
  background:transparent; border:1px solid var(--border-strong);
  color:var(--text-secondary); font-family:inherit; font-size:11px;
  padding:3px 10px; border-radius:2px; cursor:pointer;
  min-width:28px; text-align:center;
  transition:color .12s, border-color .12s;
}
.ctrl-btn:hover { color:var(--text-primary); border-color:var(--text-muted); }
.zoom-label { color:var(--text-muted); font-size:10px; min-width:38px; text-align:center; cursor:pointer; }

.map-scroll {
  flex:1; overflow-x:scroll; overflow-y:auto; min-height:0; margin:0 -16px;
  padding:0 16px 16px;
  scrollbar-gutter:stable both-edges;
}
.map-content {
  position:relative;
  min-width:calc(var(--map-canvas-width) * var(--zoom));
  width:calc(var(--map-canvas-width) * var(--zoom));
  display:block;
  padding-right:16px;
}
.mindmap-wrap { position:relative; min-height:100%; width:100%; }

/* v9: filter bar is fixed above the scroll canvas and never scrolls horizontally.
   When width is insufficient, groups wrap into vertical rows instead. */
#filter-bar-host {
  flex-shrink:0;
  position:relative;
  z-index:5;
  background:var(--bg-page);
  overflow-x:visible;
  overflow-y:visible;
}
.filter-bar {
  display:flex;
  flex-direction:column;
  align-items:stretch;
  gap:8px;
  padding:2px 0 14px;
  margin-bottom:14px;
  border-bottom:1px dashed var(--border);
}
.filter-group {
  display:flex;
  align-items:center;
  gap:5px;
  flex-wrap:wrap;
  width:100%;
  min-width:0;
}
.filter-label {
  color:var(--text-muted); font-size:10px; text-transform:uppercase;
  letter-spacing:0.06em; margin-right:4px;
}
.filter-chip {
  background:transparent; border:1px solid var(--border-strong);
  color:var(--text-secondary); font-family:inherit; font-size:11px;
  padding:3px 9px; border-radius:2px; cursor:pointer;
  transition:color .12s, border-color .12s, background .12s;
}
.filter-chip:hover { color:var(--text-primary); border-color:var(--text-muted); }
.filter-chip.active {
  background:rgba(204,120,92,0.08); border-color:var(--accent); color:var(--accent);
}

.zoomable { position:relative; width:100%; font-size:calc(13px * var(--zoom)); }

/* The map uses a fixed-width scroll canvas. The main spine is centred
   inside that canvas, while side-cards occupy a left lane. This prevents
   side trees from pushing the main spine off-centre or overlapping it. */
.flow {
  position:relative; display:flex; flex-direction:column; align-items:center;
  z-index:2; padding-top:4px; padding-left:0; width:100%; min-width:100%;
}

.node {
  position:relative; background:var(--bg-panel-alt);
  border:1px solid var(--border-strong); border-radius:4px;
  padding:calc(10px * var(--zoom)) calc(14px * var(--zoom));
  min-width:calc(320px * var(--zoom)); max-width:calc(460px * var(--zoom));
  text-align:left; cursor:pointer; z-index:3;
  transition:border-color .12s ease, box-shadow .12s ease;
}
.node:hover { border-color:var(--accent); }
.node.selected { border-color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent); }
.node.expanded { box-shadow:inset 3px 0 0 var(--accent); }
.node.expanded.selected { box-shadow:inset 3px 0 0 var(--accent), inset 0 0 0 1px var(--accent); }

.node-title { color:var(--text-primary); font-size:calc(13px * var(--zoom)); font-weight:500; }
.node-sub { color:var(--text-secondary); font-size:calc(11px * var(--zoom)); margin-top:2px; line-height:1.45; }

.variant-chips {
  margin-top:9px; display:flex; flex-wrap:wrap; gap:5px 6px;
}
.variant-chip {
  background:var(--bg-page); border:1px solid var(--border);
  color:var(--text-muted);
  font-size:calc(10px * var(--zoom));
  padding:calc(2px * var(--zoom)) calc(7px * var(--zoom));
  border-radius:2px; cursor:pointer; font-family:inherit; line-height:1.5;
  transition:color .12s, border-color .12s, background .12s;
}
.variant-chip:hover { color:var(--text-primary); border-color:var(--border-strong); }
.variant-chip.match {
  color:var(--accent); border-color:var(--accent);
  background:rgba(204,120,92,0.10);
}
.variant-chip.ablation { color:var(--text-muted); opacity:0.55; font-style:italic; }
.variant-chip.ablation.active {
  opacity:1; color:var(--accent-warn); border-color:var(--accent-warn);
  background:rgba(212,167,90,0.10);
}

.connector {
  height:calc(36px * var(--zoom));
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.connector .line { width:1.5px; height:calc(22px * var(--zoom)); background:var(--accent); }
.connector .chev {
  font-size:calc(11px * var(--zoom)); line-height:1; margin-top:-2px;
  color:var(--accent); font-family:inherit;
}

.side-expansion-spacer {
  width:100%; display:flex; justify-content:center; align-items:stretch;
  pointer-events:none;
}
.side-expansion-spacer .line {
  width:1.5px; height:100%; background:var(--accent);
}

.flow.amber .connector .line { background:var(--accent-warn); }
.flow.amber .connector .chev { color:var(--accent-warn); }
.flow.amber .cat-items { border-left-color:var(--accent-warn); }

/* side cards */
.side-box {
  position:absolute; background:var(--bg-panel-alt);
  border:1px solid var(--border-strong); border-radius:3px;
  padding:calc(5px * var(--zoom)) calc(9px * var(--zoom));
  font-size:calc(11px * var(--zoom)); color:var(--text-secondary);
  cursor:pointer; z-index:3; white-space:nowrap; max-width:calc(320px * var(--zoom));
  transition:border-color .12s ease, color .12s ease;
}
.side-box:hover { color:var(--accent); border-color:var(--accent); }
.side-box.selected { color:var(--accent); border-color:var(--accent); }
.side-box.filter-match { color:var(--accent); border-color:var(--accent); }
.side-box .sb-label {
  color:var(--text-muted); font-size:calc(9px * var(--zoom));
  display:block; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:1px;
}
.side-box.inherit .sb-label { color:var(--accent-soft); }
.side-box.option .sb-label { color:var(--accent-warn); }

.edges-svg {
  position:absolute; top:0; left:0; width:100%; height:100%;
  overflow:visible; pointer-events:none; z-index:1;
}

.legend {
  flex-shrink:0; align-self:flex-start; background:var(--bg-panel-alt);
  border:1px solid var(--border); padding:8px 10px; font-size:10px;
  color:var(--text-secondary); border-radius:3px; margin-top:12px;
}
.legend .item { display:flex; align-items:center; gap:10px; margin:3px 0; }
.legend .swatch { display:inline-block; width:24px; height:0; }
.legend .swatch.run     { border-top:1.5px solid var(--accent); }
.legend .swatch.import  { border-top:1px solid var(--edge-import); }
.legend .swatch.inherit { border-top:1px dashed var(--accent-soft); }

/* results */
.results-root-node {
  background:var(--bg-panel-alt); border:1px solid var(--accent-warn);
  border-radius:4px; padding:8px 14px; font-size:calc(12px * var(--zoom));
  color:var(--accent-warn); text-align:center; min-width:calc(320px * var(--zoom));
}
.cat-group { width:100%; max-width:calc(480px * var(--zoom)); margin:0 auto 16px; }
.cat-title {
  color:var(--accent-warn); font-size:calc(11px * var(--zoom));
  margin:8px 0; text-transform:uppercase; letter-spacing:0.06em; white-space:pre;
}
.cat-items {
  display:flex; flex-direction:column; gap:6px;
  padding-left:16px; border-left:1px solid var(--accent-warn); margin-left:12px;
}
.cat-items .node { min-width:0; max-width:100%; width:100%; }


/* paper-code mapping */
.paper-code-view {
  width:100%; max-width:1100px; margin:0 auto; padding:4px 0 40px;
}
.paper-intro {
  border:1px solid var(--border); background:var(--bg-panel-alt);
  border-left:3px solid var(--accent-soft); border-radius:4px;
  padding:12px 14px; margin-bottom:14px; color:var(--text-secondary);
  font-size:11px; line-height:1.65;
}
.paper-card {
  display:grid; grid-template-columns:minmax(220px, 32%) 1fr;
  gap:0; border:1px solid var(--border-strong); border-radius:5px;
  background:var(--bg-panel-alt); margin-bottom:10px; overflow:hidden;
}
.paper-left {
  padding:13px 14px; border-right:1px solid var(--border);
  background:rgba(107,142,127,0.045);
}
.paper-badge {
  display:inline-block; color:var(--accent-soft); border:1px solid var(--accent-soft);
  border-radius:2px; padding:2px 8px; font-size:10px; letter-spacing:0.06em;
  text-transform:uppercase; margin-bottom:8px;
}
.paper-title { color:var(--text-primary); font-size:12px; line-height:1.45; }
.paper-note { color:var(--text-muted); font-size:10px; margin-top:6px; line-height:1.5; }
.paper-right { padding:12px 14px; }
.code-ref-list { display:flex; flex-direction:column; gap:7px; }
.code-ref {
  display:block; width:100%; text-align:left; background:var(--bg-page);
  border:1px solid var(--border); color:var(--text-secondary);
  font-family:inherit; font-size:11px; line-height:1.5;
  padding:7px 9px; border-radius:3px; cursor:pointer;
  transition:color .12s, border-color .12s, background .12s;
}
.code-ref:hover { color:var(--accent); border-color:var(--accent); background:rgba(204,120,92,0.06); }
.code-ref .code-file { color:var(--accent); }
.code-ref .code-symbol { color:var(--text-secondary); }
.code-ref.external { cursor:default; color:var(--text-muted); border-style:dashed; }
.code-ref.external:hover { color:var(--text-muted); border-color:var(--border); background:var(--bg-page); }
.code-ref.external .code-file { color:var(--accent-warn); }
.app-footer {
  height:28px; flex-shrink:0; border-top:1px solid var(--border);
  background:var(--bg-panel); color:var(--text-muted); display:flex;
  align-items:center; justify-content:center; gap:8px; font-size:10px;
  letter-spacing:0.04em; white-space:nowrap;
}
.app-footer a { color:var(--accent); text-decoration:none; border-bottom:1px dotted var(--accent); }
.app-footer a:hover { border-bottom-style:solid; }
@media (max-width:900px) {
  .paper-card { grid-template-columns:1fr; }
  .paper-left { border-right:none; border-bottom:1px solid var(--border); }
}

/* inspector */
.detail-default {
  font-size:11px; color:var(--text-secondary); line-height:1.85;
  white-space:pre-wrap; padding:4px 0;
}
.detail-default .accent { color:var(--accent); }
.detail-default .soft   { color:var(--accent-soft); }
.detail-default .gray   { color:var(--text-muted); }

.detail-title-row { margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.detail-path { color:var(--accent); font-size:13px; word-break:break-all; }
.detail-role { color:var(--text-secondary); font-size:11px; margin-top:4px; line-height:1.55; }

.ablation-banner {
  background:rgba(212,167,90,0.06); border-left:2px solid var(--accent-warn);
  padding:9px 11px; margin:-4px 0 16px;
  font-size:11px; color:var(--text-secondary); line-height:1.6;
}
.ablation-banner .bnr-head { color:var(--text-primary); margin-bottom:6px; font-size:11px; }
.ablation-banner .bnr-name { color:var(--accent-warn); }
.ablation-banner .bnr-kind { color:var(--text-muted); font-size:10px; }
.ablation-banner .bnr-body { margin-bottom:6px; }
.ablation-banner .bnr-ref { color:var(--accent-soft); font-size:10px; }

.detail-row {
  display:grid; grid-template-columns:96px 1fr; gap:10px;
  margin-bottom:10px; font-size:11px; line-height:1.55;
}
.detail-row .key {
  color:var(--text-muted); font-size:10px; text-transform:uppercase;
  letter-spacing:0.05em; padding-top:1px;
}
.detail-row .val { color:var(--text-primary); word-break:break-word; font-size:11px; }
.detail-row .val .empty { color:var(--text-muted); font-style:italic; }
.detail-row .val.paper-ref { color:var(--accent-soft); }
.detail-row .val ul { list-style:none; padding:0; margin:0; }
.detail-row .val li {
  font-size:11px; color:var(--text-secondary); position:relative;
  padding-left:14px; line-height:1.65;
}
.detail-row .val li::before { content:"─"; position:absolute; left:0; color:var(--text-muted); }
.detail-row .val li.link { color:var(--accent); cursor:pointer; }
.detail-row .val li.link:hover { text-decoration:underline; }

.mindmap-title-row { display:flex; align-items:baseline; flex-wrap:wrap; gap:10px; }
.filter-summary { color:var(--text-muted); font-size:10px; }
.filter-summary .pill { color:var(--accent); }

/* ==== MANUAL — redesigned in v4 ==== */
.manual-page {
  height:100%; overflow:hidden; display:flex; flex-direction:column;
  background:var(--bg-page);
}
.manual-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:18px 40px 16px; border-bottom:1px solid var(--border); flex-shrink:0;
  gap:12px;
}
.manual-title-row {
  display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
}
.manual-title {
  color:var(--text-primary); font-size:14px; letter-spacing:0.02em;
}
.manual-crumb {
  color:var(--text-secondary); font-size:11px;
  letter-spacing:0.08em; text-transform:uppercase;
  border:1px solid var(--border-strong); padding:2px 9px; border-radius:2px;
}
.lang-toggle { display:flex; gap:4px; flex-shrink:0; }
.lang-btn {
  background:transparent; border:1px solid var(--border-strong);
  color:var(--text-secondary); font-family:inherit; font-size:12px;
  padding:4px 12px; cursor:pointer; border-radius:2px;
}
.lang-btn:hover { color:var(--text-primary); border-color:var(--text-muted); }
.lang-btn.active { border-color:var(--accent); color:var(--accent); }

.manual-body {
  flex:1; display:flex; min-height:0; overflow:hidden;
}
.manual-sub-tabs {
  width:280px; flex-shrink:0; border-right:1px solid var(--border);
  padding:24px 18px; overflow-y:auto; display:flex; flex-direction:column;
  gap:8px;
}
.manual-sub-tabs .manual-sub-header {
  font-size:10px; color:var(--text-muted); text-transform:uppercase;
  letter-spacing:0.08em; margin-bottom:6px;
}
.manual-sub-tab {
  background:transparent; border:1px solid var(--border-strong);
  color:var(--text-secondary); font-family:inherit; font-size:12px;
  padding:9px 12px; border-radius:2px; cursor:pointer;
  text-align:left; line-height:1.4;
  transition:color .12s, border-color .12s, background .12s;
}
.manual-sub-tab:hover { color:var(--text-primary); border-color:var(--text-muted); }
.manual-sub-tab.active {
  color:var(--accent); border-color:var(--accent);
  background:rgba(204,120,92,0.10);
}

#manual-content {
  flex:1; overflow-y:auto; padding:32px 40px 80px;
  font-size:13px; line-height:1.78; color:var(--text-primary);
}
#manual-content .pane-inner { max-width:760px; margin:0 auto; }
#manual-content h1 { font-size:17px; color:var(--accent); margin-bottom:8px; font-weight:500; }
#manual-content .subtitle { color:var(--text-muted); font-size:11px; margin-bottom:30px; }
#manual-content h2 {
  font-size:12px; color:var(--accent); margin:32px 0 12px;
  font-weight:500; text-transform:uppercase; letter-spacing:0.08em;
  border-top:1px solid var(--border); padding-top:24px;
}
#manual-content h2:first-of-type { border-top:none; padding-top:0; }
#manual-content p { margin-bottom:12px; color:var(--text-primary); }
#manual-content p.disclaimer {
  background:var(--bg-panel-alt); border-left:2px solid var(--accent-warn);
  padding:10px 14px; font-size:12px; color:var(--text-secondary);
  border-radius:0 2px 2px 0;
}
#manual-content .table {
  font-size:12px; color:var(--text-secondary); background:var(--bg-panel-alt);
  padding:12px 16px; border-radius:3px; margin:8px 0 16px;
  white-space:pre; font-family:inherit; overflow-x:auto; border:1px solid var(--border);
}
#manual-content code { color:var(--accent); background:var(--bg-panel-alt); padding:1px 5px; border-radius:2px; font-size:12px; }
#manual-content a { color:var(--accent); text-decoration:none; border-bottom:1px dotted var(--accent); }
#manual-content a:hover { border-bottom-style:solid; }
#manual-content ul, #manual-content ol { padding-left:0; list-style:none; margin:6px 0 14px; }
#manual-content ul li, #manual-content ol li {
  position:relative; padding-left:16px; margin-bottom:4px; color:var(--text-secondary);
}

function renderTree() {
  const container = document.getElementById('file-tree');
  container.innerHTML = '';
  const rows = [];
  flattenTree(TREE, '', false, rows, '');
  rows.forEach(r => {
    const el = document.createElement('div');
    el.className = 'tree-item';
    if (r.kind === 'root')   el.classList.add('is-root');
    if (r.kind === 'folder') el.classList.add('is-folder');
    if (r.path && r.path === selectedFile) el.classList.add('selected');
    el.dataset.path = r.path || '';
    el.dataset.kind = r.kind;
    el.textContent = r.display;
    el.addEventListener('click', () => {
      if (r.kind === 'folder' && r.ref) {
        r.ref.open = !r.ref.open;
        renderTree();
      } else if (r.kind === 'file') {
        selectFromTree(r.path);
      }
    });
    container.appendChild(el);
  });
}

function flattenTree(node, prefix, isLast, out, parentPath) {
  if (node.isRoot) {
    out.push({display:node.name+'/',kind:'root',path:''});
    if (node.children) node.children.forEach((c,i) => flattenTree(c,'',i===node.children.length-1,out,''));
    return;
  }
  const branch = isLast ? '└── ' : '├── ';
  const myPath = parentPath ? parentPath+'/'+node.name : node.name;
  if (node.type === 'folder') {
    out.push({display:prefix+branch+node.name+'/',kind:'folder',path:'',ref:node});
    if (node.open && node.children) {
      const np = prefix + (isLast ? '    ' : '│   ');
      node.children.forEach((c,i) => flattenTree(c,np,i===node.children.length-1,out,myPath));
    }
  } else {
    out.push({display:prefix+branch+node.name,kind:'file',path:myPath});
  }
}

function renderMindMap(recenterAfter = false) {
  const wrap = document.getElementById('mindmap-wrap');
  const host = document.getElementById('filter-bar-host');
  wrap.innerHTML = '';
  host.innerHTML = '';
  updateMindMapTitle();

  if (currentTab === 'training') {
    renderFilterBar(host);
    renderLinearFlow(wrap, MAPS.training);
    requestAnimationFrame(() => renderSideEdges(wrap));
  } else if (currentTab === 'evaluation') {
    renderLinearFlow(wrap, MAPS.evaluation);
  } else if (currentTab === 'results') {
    renderResultsTree(wrap);
  } else if (currentTab === 'paper') {
    renderPaperCodeView(wrap);
  }
  syncSelectionToMap();
  if (recenterAfter && currentTab !== 'manual') {
    requestAnimationFrame(() => requestAnimationFrame(recenter));
  }
}

  const title = document.getElementById('mindmap-title');
  const summary = document.getElementById('filter-summary');
  if (currentTab === 'training') {

function renderFilterBar(host) {
  const bar = document.createElement('div');
  bar.className = 'filter-bar';
  ['problem','policy','action'].forEach(axis => {
    const group = document.createElement('div');
    group.className = 'filter-group';
    const label = document.createElement('span');
    label.className = 'filter-label';
    label.textContent = axis + ':';
    group.appendChild(label);
    FILTERS[axis].forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip' + (filters[axis] === opt.id ? ' active' : '');
      btn.textContent = opt.label;
      btn.title = axis + ' = ' + opt.label;
      btn.addEventListener('click', () => {
        // Filter bar chip: filter only, no navigation
        filters[axis] = opt.id;
        renderMindMap();
      });
      group.appendChild(btn);
    });
    bar.appendChild(group);
  });
  host.appendChild(bar);
}

function chipMatchesFilters(chip) {
  if (!chip.match) return false;
  for (const axis of Object.keys(chip.match)) {
    const want = chip.match[axis];
    const cur  = filters[axis];
    if (Array.isArray(want)) {
      if (!want.includes(cur)) return false;
    } else {
      if (want !== cur) return false;
    }
  }
  return true;
}

function renderLinearFlow(wrap, nodes) {
  const flow = document.createElement('div');
  flow.className = 'flow';
  flow.id = 'spine-flow';
  nodes.forEach((n, idx) => {
    flow.appendChild(createMapNode(n));

    if (currentTab === 'training' && n.id === expandedSpineNode) {
      const spacerHeight = computeSideExpansionSpacerHeight();
      if (spacerHeight > 0) {
        const spacer = document.createElement('div');
        spacer.className = 'side-expansion-spacer';
        spacer.style.height = spacerHeight + 'px';
        spacer.innerHTML = '<div class="line"></div>';
        flow.appendChild(spacer);
      }
    }

    if (idx < nodes.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.innerHTML = '<div class="line"></div><div class="chev">▼</div>';
      flow.appendChild(conn);
    }
  });
  wrap.appendChild(flow);
}

function computeSideExpansionSpacerHeight() {
  const sideCount = getSideBoxesForExpandedNode().length;
  if (sideCount <= 3) return 0;
  const estimatedBoxHeight = 42 * zoom;
  const estimatedGap = 12 * zoom;
  const currentNodeAllowance = 96 * zoom;
  return Math.max(0, sideCount * (estimatedBoxHeight + estimatedGap) - currentNodeAllowance);
}

function createMapNode(n) {
  const el = document.createElement('div');
  el.className = 'node';
  el.dataset.mapId = n.id || n.file;
  el.dataset.file = n.file;
  el.title = n.title + (n.sub ? '  —  ' + n.sub : '');
  if (currentTab === 'training' && n.id === expandedSpineNode) {
    el.classList.add('expanded');
  }
  let html = '<div class="node-title">' + escapeHtml(n.title) + '</div>';
  if (n.sub) html += '<div class="node-sub">' + escapeHtml(n.sub) + '</div>';
  if (n.chips && n.chips.length > 0) {
    html += '<div class="variant-chips">';
    n.chips.forEach((chip) => {
      let cls = 'variant-chip';
      if (chip.kind === 'ablation') {
        cls += ' ablation';
        if (ablationFocus === chip.label) cls += ' active';
      } else if (chipMatchesFilters(chip)) {
        cls += ' match';
      }
      const titleStr = chip.label + (chip.kind === 'ablation' ? ' (ablation function inside ' + chip.file + ')' : '');
      html += '<button type="button" class="' + cls +
              '" data-chip="1"' +
              (chip.kind === 'ablation' ? ' data-ablation="' + escapeAttr(chip.label) + '"' : '') +
              (chip.match ? ' data-match-axis="' + Object.keys(chip.match)[0] + '" data-match-value="' + escapeAttr(Array.isArray(chip.match[Object.keys(chip.match)[0]]) ? chip.match[Object.keys(chip.match)[0]][0] : chip.match[Object.keys(chip.match)[0]]) + '"' : '') +
              ' data-file="' + escapeAttr(chip.file) + '"' +
              ' title="' + escapeAttr(titleStr) + '">' +
              escapeHtml(chip.label) + '</button>';
    });
    html += '</div>';
  }
  el.innerHTML = html;

  el.addEventListener('click', (e) => {
    const chipEl = e.target.closest('.variant-chip');
    if (chipEl && el.contains(chipEl)) {
      handleVariantChipClick(chipEl, n);
    } else {
      handleSpineBodyClick(n);
    }
  });
  return el;
}

function handleVariantChipClick(chipEl, n) {
  const isAblation = !!chipEl.dataset.ablation;
  const file = chipEl.dataset.file;

  if (isAblation) {
    ablationFocus = chipEl.dataset.ablation;
  } else {
    ablationFocus = null;
    const axis = chipEl.dataset.matchAxis;
    if (axis) {
      // Find chip's actual match value (handle array matches)
      const chip = n.chips.find(c => c.label === chipEl.textContent);
      if (chip && chip.match && chip.match[axis] !== undefined) {
        const v = chip.match[axis];
        filters[axis] = Array.isArray(v) ? v[0] : v;
      }
    }
  }

  selectedFile = file;
  expandedSpineNode = n.id;
  openParentFolder(file);
  renderTree();
  renderMindMap();
  renderDetail();
}

function handleSpineBodyClick(n) {
  ablationFocus = null;
  // Choose canonical file: if node has chips, prefer the chip matching current filter
  let target = n.file;
  if (n.chips) {
    const m = n.chips.find(c => chipMatchesFilters(c));
    if (m) target = m.file;
  }
  selectedFile = target;
  if (currentTab === 'training' && n.id) {
    expandedSpineNode = n.id;
  }
  openParentFolder(target);
  renderTree();
  renderMindMap();
  renderDetail();
}


function renderPaperCodeView(wrap) {
  const view = document.createElement('div');
  view.className = 'paper-code-view';

  const intro = document.createElement('div');
  intro.className = 'paper-intro';
  intro.innerHTML = 'This view links Orfanoudakis et al. 2025 paper landmarks to the repository files that implement, evaluate, or visualise them. Click an internal code reference to open its inspector entry and jump back to the relevant execution tab.';
  view.appendChild(intro);

  PAPER_CODE_MAPPINGS.forEach(item => {
    const card = document.createElement('div');
    card.className = 'paper-card';

    const left = document.createElement('div');
    left.className = 'paper-left';
    left.innerHTML =
      '<div class="paper-badge">' + escapeHtml(item.landmark) + '</div>' +
      '<div class="paper-title">' + escapeHtml(item.title) + '</div>' +
      (item.note ? '<div class="paper-note">' + escapeHtml(item.note) + '</div>' : '');

    const right = document.createElement('div');
    right.className = 'paper-right';
    const list = document.createElement('div');
    list.className = 'code-ref-list';

    item.refs.forEach(ref => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'code-ref' + (ref.external ? ' external' : '');
      const display = ref.display || ref.file;
      btn.innerHTML =
        '<span class="code-file">' + escapeHtml(display) + '</span>' +
        (ref.symbol ? ' <span class="code-symbol">:: ' + escapeHtml(ref.symbol) + '</span>' : '');
      if (!ref.external && ref.file) {
        btn.dataset.file = ref.file;
        btn.addEventListener('click', () => jumpToCodeRef(ref.file));
      }
      list.appendChild(btn);
    });

    right.appendChild(list);
    card.appendChild(left);
    card.appendChild(right);
    view.appendChild(card);
  });

  wrap.appendChild(view);
}

function jumpToCodeRef(file) {
  if (!file || !NODES[file]) return;
  ablationFocus = null;
  selectedFile = file;
  openParentFolder(file);

  let targetTab = 'training';
  if (file.startsWith('Results_Analysis/')) targetTab = 'results';
  else if (file === 'evaluator.py') targetTab = 'evaluation';

  currentTab = targetTab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === targetTab);
  });
  document.getElementById('main-area').dataset.activeTab = targetTab;

  renderTree();
  renderMindMap(true);
  renderDetail();
}

function renderResultsTree(wrap) {
  const flow = document.createElement('div');
  flow.className = 'flow amber';
  flow.id = 'spine-flow';

  const root = document.createElement('div');
  root.className = 'results-root-node';
  root.textContent = 'Results_Analysis/';
  flow.appendChild(root);

  const conn = document.createElement('div');
  conn.className = 'connector';
  conn.innerHTML = '<div class="line"></div><div class="chev">▼</div>';

  MAPS.results.forEach(cat => {
    const group = document.createElement('div');

    const title = document.createElement('div');

    group.appendChild(title);

function renderSideEdges(wrap) {
  // Always clear first
  wrap.querySelectorAll('.side-box').forEach(el => el.remove());
  wrap.querySelectorAll('.edges-svg').forEach(el => el.remove());
  if (currentTab !== 'training') return;

  const edges = getSideBoxesForExpandedNode();
  if (edges.length === 0) return;

  const targetNode = wrap.querySelector('[data-map-id="' + expandedSpineNode + '"]');
  if (!targetNode) return;

  // Use offsetLeft/offsetTop (unscaled) for layout math.
  // With padding-left:380px on .flow, targetNode.offsetLeft is now well to the
  // right of the .mindmap-wrap origin, so cardRightX below is positive.
  const targetX = targetNode.offsetLeft;
  const targetTop = targetNode.offsetTop;
  const targetHeight = targetNode.offsetHeight;
  const targetCenterY = targetTop + targetHeight / 2;

  const horizontalGap = 190 * zoom;
  const cardGap = 12 * zoom;
  const busX = targetX - horizontalGap / 2;
  const cardRightX = targetX - horizontalGap;

  // SVG layer
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('edges-svg');
  wrap.appendChild(svg);

  // Create boxes first (off-screen) to measure heights
  const boxes = [];
  edges.forEach((edge, idx) => {
    const filterHit = (edge.file === 'utils/action_wrapper.py' && filters.action === 'Three-step');
    const box = document.createElement('div');
    let cls = 'side-box';
    if (edge.type === 'inherit') cls += ' inherit';
    if (edge.type === 'option') cls += ' option';
    if (filterHit) cls += ' filter-match';
    box.className = cls;
    box.dataset.file = edge.file;
    box.title = edge.text + (filterHit ? '  (active: Three-step filter)' : '');
    box.innerHTML =
      '<span class="sb-label">' + escapeHtml(edge.label) + '</span>' +
      escapeHtml(edge.text);
    box.style.visibility = 'hidden';
    box.style.top = '0px';
    box.style.left = '0px';
    wrap.appendChild(box);
    boxes.push({el:box, edge, filterHit});
  });

  // Measure each box, then stack top-down starting at target's top
  let cursorY = Math.max(8, targetTop);
  const cardCenters = [];
  boxes.forEach(b => {
    const w = b.el.offsetWidth;
    const h = b.el.offsetHeight;
    const left = cardRightX - w;
    b.el.style.left = left + 'px';
    b.el.style.top = cursorY + 'px';
    b.el.style.visibility = '';
    b.cy = cursorY + h / 2;
    b.right = left + w;
    cardCenters.push(b.cy);
    cursorY += h + cardGap;
  });

  // Click handlers (after positioning)
  boxes.forEach(b => {
    b.el.addEventListener('click', (e) => {
      e.stopPropagation();
      ablationFocus = null;
      selectedFile = b.edge.file;
      openParentFolder(b.edge.file);
      renderTree();
      syncSelectionToMap();
      renderDetail();
    });
  });

  // Draw paths: per-card horizontal + shared vertical bus + single exit to target
  const minBus = Math.min(targetCenterY, ...cardCenters);
  const maxBus = Math.max(targetCenterY, ...cardCenters);

  // Per-card horizontal stubs
  boxes.forEach(b => {
    const isInherit = b.edge.type === 'inherit';
    const stroke = b.filterHit ? '#CC785C' : (isInherit ? '#6B8E7F' : '#3A3A3A');
    const sw = b.filterHit ? 1.5 : 1;
    const dash = isInherit ? '4 3' : 'none';
    addPath(svg, 'M ' + b.right + ' ' + b.cy + ' H ' + busX, stroke, sw, dash);
  });

  // Vertical bus
  // For bus type/style, use first edge's type (mixed types are rare; train has all import, policy has only inherit, config has only option)
  const firstType = edges[0].type;
  const busStroke = firstType === 'inherit' ? '#6B8E7F' : '#3A3A3A';
  const busDash = firstType === 'inherit' ? '4 3' : 'none';
  // Detect if action_wrapper hit makes the bus stronger (only relevant for train node)
  const anyFilterHit = boxes.some(b => b.filterHit);
  const finalBusStroke = anyFilterHit && firstType !== 'inherit' ? '#3A3A3A' : busStroke;
  addPath(svg, 'M ' + busX + ' ' + minBus + ' V ' + maxBus, finalBusStroke, 1, busDash);

  // Exit horizontal from bus to target
  const exitStroke = firstType === 'inherit' ? '#6B8E7F' : '#3A3A3A';
  const exitDash = firstType === 'inherit' ? '4 3' : 'none';
  addPath(svg, 'M ' + busX + ' ' + targetCenterY + ' H ' + (targetX - 4), exitStroke, 1, exitDash);

  // Single chevron at target
  const chev = document.createElementNS('http://www.w3.org/2000/svg','text');
  chev.setAttribute('x', targetX - 8);
  chev.setAttribute('y', targetCenterY + 4);
  chev.setAttribute('fill', exitStroke);
  chev.setAttribute('font-family', 'inherit');
  chev.setAttribute('font-size', '11');
  chev.textContent = '›';
  svg.appendChild(chev);
}

function addPath(svg, d, stroke, sw, dash) {
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', stroke);
  path.setAttribute('stroke-width', sw);
  if (dash && dash !== 'none') path.setAttribute('stroke-dasharray', dash);
  svg.appendChild(path);
}

function renderDetail() {
  const c = document.getElementById('detail-content');
  c.innerHTML = '';
  if (!selectedFile || !NODES[selectedFile]) {
    c.innerHTML =
      '<div class="detail-default">───────────────────────────────────────────\n' +
      'Click a file in the tree, or a node in\n' +
      'the map, to inspect its role in the EV-\n' +
      'GNN baseline.\n' +
      '───────────────────────────────────────────\n' +
      'Tip: edges are color-coded.\n' +
      '  <span class="accent">Terracotta  ─ runtime execution</span>\n' +
      '  <span class="soft">Sage        ┄ class inheritance</span>\n' +
      '  <span class="gray">Gray        ─ import dependency</span>\n' +
      '───────────────────────────────────────────\n' +
      'See [ Manual ] tab for the full guide.</div>';
    return;
  }
  const n = NODES[selectedFile];
  let html = '<div class="detail-title-row">';
  html += '<div class="detail-path">' + escapeHtml(n.path) + '</div>';
  if (n.role) html += '<div class="detail-role">' + escapeHtml(n.role) + '</div>';
  html += '</div>';

  // Ablation banner
  if (selectedFile === 'utils/state.py' && ablationFocus && ABLATION_NOTES[ablationFocus]) {
    const ab = ABLATION_NOTES[ablationFocus];
    html += '<div class="ablation-banner">' +
      '<div class="bnr-head">Focused: <span class="bnr-name">' + escapeHtml(ablationFocus) + '</span> <span class="bnr-kind">(ablation function)</span></div>' +
      '<div class="bnr-body">' + escapeHtml(ab.description) + '</div>' +
      '<div class="bnr-ref">' + escapeHtml(ab.paperRef) + '</div>' +
    '</div>';
  }

  html += renderRow('Purpose',       n.purpose,    'text');
  html += renderRow('Inputs',        n.inputs,     'list');
  html += renderRow('Outputs',       n.outputs,    'list');
  html += renderRow('Imports',       n.imports,    'list');
  html += renderRow('Imported by',   n.importedBy, 'list');
  html += renderRow('Key classes',   n.classes,    'list');
  html += renderRow('Key functions', n.functions,  'list');
  html += renderRow('Related files', n.related,    'links');
  html += renderRow('Paper ref',     n.paperRef,   'paper');
  c.innerHTML = html;
  c.querySelectorAll('li.link').forEach(li => {
    li.addEventListener('click', () => selectFromTree(li.dataset.file));
  });
}

function renderRow(label, value, kind) {
  let val = '';
  let cls = 'val';
  if (kind === 'text') {
    val = value ? escapeHtml(value) : '<span class="empty">—</span>';
  } else if (kind === 'list') {
    if (!value || value.length === 0) val = '<span class="empty">—</span>';
    else val = '<ul>' + value.map(v => '<li>' + escapeHtml(v) + '</li>').join('') + '</ul>';
  } else if (kind === 'links') {
    if (!value || value.length === 0) val = '<span class="empty">—</span>';
    else val = '<ul>' + value.map(v =>
      '<li class="link" data-file="' + escapeAttr(v) + '">' + escapeHtml(v) + '</li>'
    ).join('') + '</ul>';
  } else if (kind === 'paper') {
    if (!value) val = '<span class="empty">—</span>';
    else { val = escapeHtml(value); cls = 'val paper-ref'; }
  }
  return '<div class="detail-row"><div class="key">' + label + '</div><div class="' + cls + '">' + val + '</div></div>';
}

function renderManual() {
  const subTabsEl = document.getElementById('manual-sub-tabs');
  const contentEl = document.getElementById('manual-content');
  const m = MANUAL[manualLang];

  // Render the sub-tab list
  subTabsEl.innerHTML = '';
  const header = document.createElement('div');
  header.className = 'manual-sub-header';
  header.textContent = '── sections ──';
  subTabsEl.appendChild(header);

  MANUAL_SUB_TABS.forEach(key => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'manual-sub-tab' + (manualSubTab === key ? ' active' : '');
    btn.dataset.subTab = key;
    btn.textContent = m[key].label;
    btn.addEventListener('click', () => {
      manualSubTab = key;
      renderManual();
      // Reset content pane scroll to top
      contentEl.scrollTop = 0;
    });
    subTabsEl.appendChild(btn);
  });

  // Render the content pane
  contentEl.innerHTML = m[manualSubTab].content;

  // Sync language toggle
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === manualLang);
  });
}

/* ==== INTERACTION ==== */

function selectFromTree(path) {
  if (!path || !NODES[path]) return;
  ablationFocus = null;
  selectedFile = path;
  openParentFolder(path);
  renderTree();
  syncSelectionToMap();
  renderDetail();
}

function openParentFolder(path) {
  const parts = path.split('/');
  if (parts.length < 2) return;
  const folderName = parts[0];
  const folder = TREE.children.find(c => c.type === 'folder' && c.name === folderName);
  if (folder && !folder.open) folder.open = true;
}

function syncSelectionToMap() {
  document.querySelectorAll('.node, .side-box').forEach(el => {
    if (el.dataset.file && el.dataset.file === selectedFile) el.classList.add('selected');
    else el.classList.remove('selected');
  });
}

function switchTab(tab) {
  if (tab === currentTab) return;
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.getElementById('main-area').dataset.activeTab = tab;
  if (tab === 'manual') {
    // Manual is intentionally text-only. Clear the shared map containers so
    // previous Training/Evaluation/Results state cannot visually leak into it.
    document.getElementById('mindmap-wrap').innerHTML = '';
    document.getElementById('filter-bar-host').innerHTML = '';
    document.getElementById('filter-summary').innerHTML = '';
    document.getElementById('mindmap-title').textContent = '';
    renderManual();
  } else {
    renderMindMap(true);
  }
}

function applyZoom(z) {
  z = Math.max(0.5, Math.min(2.0, Math.round(z * 10) / 10));
  zoom = z;
  document.documentElement.style.setProperty('--zoom', z);
  document.getElementById('zoom-label').textContent = Math.round(z * 100) + '%';
  if (currentTab === 'training') {
    requestAnimationFrame(() => renderSideEdges(document.getElementById('mindmap-wrap')));
  }
}

function recenter() {
  const scroller = document.getElementById('map-scroll');
  const flow = document.getElementById('spine-flow');
  if (!scroller || !flow) return;
  // After v4's padding-left on .flow, flow.offsetWidth/2 is no longer the
  // spine center. Measure the first actual spine element (a .node for
  // training/evaluation, .results-root-node for results) and center on it.
  const firstSpine = flow.querySelector('.node, .results-root-node');
  if (!firstSpine) {
    scroller.scrollTo({left: 0, top: 0, behavior: 'smooth'});
    return;
  }
  // firstSpine.offsetLeft is relative to .flow (.flow has position:relative,
  // so it is the offsetParent). flow.offsetLeft is relative to .mindmap-wrap.
  // The scroller (#map-scroll) wraps .map-content which wraps .mindmap-wrap,
  // so combined offsets give the absolute left within the scroller content.
  const spineLeft = firstSpine.offsetLeft + flow.offsetLeft;
  const spineCenter = spineLeft + firstSpine.offsetWidth / 2;
  const target = Math.max(0, spineCenter - scroller.clientWidth / 2);
  scroller.scrollTo({left: target, top: 0, behavior: 'smooth'});
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}
function escapeAttr(s) { return escapeHtml(s); }

/* ==== EVENT WIRING ==== */

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

document.getElementById('zoom-in').addEventListener('click', () => applyZoom(zoom + 0.1));
document.getElementById('zoom-out').addEventListener('click', () => applyZoom(zoom - 0.1));
document.getElementById('zoom-label').addEventListener('click', () => applyZoom(1.0));
document.getElementById('recenter').addEventListener('click', recenter);

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => {
    manualLang = b.dataset.lang;
    renderManual();
  });
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (currentTab === 'training') {
      renderSideEdges(document.getElementById('mindmap-wrap'));
    }
  }, 120);
});

/* ==== INIT ==== */
renderTree();
if (currentTab !== 'manual') {
  renderMindMap(true);
}
renderDetail();
renderManual();
</script>
